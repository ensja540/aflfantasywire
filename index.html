@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* \u2500\u2500 DARK MODE (default) \u2500\u2500 */
:root{
  --bg:#0b0d10;--s1:#111418;--s2:#181c22;--s3:#1e2430;--s4:#252d38;
  --b1:rgba(255,255,255,0.055);--b2:rgba(255,255,255,0.1);
  --tx:#ede9e2;--mu:#7b8899;--di:#49545f;
  --buy:#3ddc84;--sell:#ff4f4f;--hold:#e6b800;
  --gold:#f0c040;--grass:#1d6b35;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}

/* \u2500\u2500 LIGHT MODE \u2500\u2500 */
body.light{
  --bg:#f0f2f5;--s1:#ffffff;--s2:#f7f8fa;--s3:#eceef2;--s4:#e2e5ea;
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.12);
  --tx:#1a1d23;--mu:#5a6478;--di:#9aa0ae;
  --buy:#1a9e5c;--sell:#d93025;--hold:#b8860b;
  --gold:#c89000;--grass:#1a5e2e;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}

body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px;line-height:1.5;transition:background 0.2s,color 0.2s}
button{cursor:pointer;font-family:var(--fb)}
input,select,textarea{outline:none;font-family:var(--fb)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:0.4}50%{opacity:0.75}}
@keyframes notifIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toggleSlide{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}

/* \u2500\u2500 MOBILE \u2500\u2500 */
@media(max-width:768px){
  .desktop-only{display:none!important}
  .mobile-nav{display:flex!important}
  .sidebar{display:none!important}
  .right-panel{display:none!important}
  .main-content{min-width:0!important;width:100%!important}
  .header-nav{display:none!important}
  .header-search{display:none!important}
}
@media(min-width:769px){
  .mobile-nav{display:none!important}
  .mobile-menu-panel{display:none!important}
}
