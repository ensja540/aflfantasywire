name: Deploy to Cloudflare

# Deploys the Worker + static shell to Cloudflare. Runs on Linux because
# Cloudflare's `workerd` (bundled by wrangler) has no Windows-ARM64 build, so the
# scraping machine can't run `wrangler deploy` itself.
#
# Only fires on CODE / app-shell changes — NOT on the ~5-min data commits from
# auto_scrape. The app loads all dynamic data (players/news/dvp/tweets) from
# GitHub raw, so Cloudflare only ever needs to serve the static shell.
#
# Requires one repo secret: CLOUDFLARE_API_TOKEN (Cloudflare dashboard ->
# My Profile -> API Tokens -> "Edit Cloudflare Workers" template).

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "worker.js"
      - "auth.js"
      - "wrangler.jsonc"
      - "sw.js"
      - "manifest.json"
      - ".assetsignore"
      - "**/*.svg"
      - "**/*.png"
      - "**/*.ico"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          npx --yes wrangler@latest deploy 2>&1 | tee deploy.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "----- deploy failed (code $code); surfacing wrangler output as annotations -----"
            grep -viE '^[[:space:]]*$' deploy.log | tail -30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit "$code"
          fi
